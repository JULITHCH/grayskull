<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GRAYSKULL // WEB</title>
<style>
:root {
  --g: #00ff66; --g-dim: #00aa44; --g-faint: #014420;
  --bg: #010701; --panel: rgba(0, 20, 6, .72); --red: #ff2244; --amber: #ffaa00; --cyan: #00ddff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg); color: var(--g);
  font-family: "JetBrains Mono", "Fira Code", ui-monospace, monospace;
  font-size: 13px; overflow: hidden;
}
body.kamikazeee { --g: #ff5566; --g-dim: #cc2233; --g-faint: #440a12; --panel: rgba(28, 2, 6, .78); }
#rain { position: fixed; inset: 0; z-index: 0; opacity: .5; }
body::after { /* CRT scanlines */
  content: ""; position: fixed; inset: 0; z-index: 50; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent 0 2px, rgba(0,0,0,.16) 2px 4px);
}
#app { position: relative; z-index: 1; display: grid; height: 100vh; height: 100dvh;
  grid-template-columns: 220px 1fr 420px; grid-template-rows: 46px 1fr; gap: 8px; padding: 8px; }
#tabs { display: none; }

header { grid-column: 1 / 4; display: flex; align-items: center; gap: 16px;
  border: 1px solid var(--g-faint); background: var(--panel); padding: 0 14px; }
header .logo { font-weight: 700; letter-spacing: 4px; font-size: 16px;
  text-shadow: 0 0 8px var(--g), 0 0 24px var(--g-dim); animation: flicker 6s infinite; }
@keyframes flicker { 0%,93%,100% {opacity:1} 94% {opacity:.6} 95% {opacity:1} 97% {opacity:.7} 98% {opacity:1} }
header .chip { border: 1px solid var(--g-faint); padding: 2px 8px; font-size: 11px; color: var(--g-dim); }
header .chip.alert { color: var(--red); border-color: var(--red); text-shadow: 0 0 6px var(--red); animation: pulse 1s infinite; }
@keyframes pulse { 50% { opacity: .4 } }

.panel { border: 1px solid var(--g-faint); background: var(--panel); display: flex; flex-direction: column; min-height: 0;
  box-shadow: inset 0 0 30px rgba(0,255,102,.03); }
.panel h2 { font-size: 11px; letter-spacing: 2px; color: var(--g-dim); padding: 6px 10px;
  border-bottom: 1px solid var(--g-faint); flex: 0 0 auto; }

#sessions { grid-row: 2; }
#sessionList { overflow-y: auto; flex: 1; }
.sess { padding: 8px 10px; border-bottom: 1px solid var(--g-faint); cursor: pointer; }
.sess:hover, .sess.active { background: rgba(0,255,102,.08); }
.sess .sid { color: var(--g); font-weight: 700; }
.sess .cwd { color: var(--g-dim); font-size: 11px; word-break: break-all; }
.sess .busy { color: var(--amber); }
#newSess { margin: 8px; padding: 6px; border: 1px dashed var(--g-dim); background: none; color: var(--g);
  cursor: pointer; font-family: inherit; }
#newSess:hover { background: rgba(0,255,102,.1); }

#main { grid-row: 2; display: flex; flex-direction: column; min-height: 0; }
#transcript { flex: 1; overflow-y: auto; padding: 10px 14px; scroll-behavior: smooth; }
.item { margin: 8px 0; white-space: pre-wrap; word-break: break-word; }
.item.user { color: var(--cyan); }
.msg-img { max-width: 320px; max-height: 240px; margin-top: 4px; border: 1px solid var(--g-faint); }
.item.user::before { content: "❯ "; font-weight: 700; }
.item.assistant { color: #ccffdd; }
body.kamikazeee .item.assistant { color: #ffd5da; }
.item.note { color: var(--g-dim); font-size: 12px; }
.item.banner { color: var(--amber); font-weight: 700; text-shadow: 0 0 8px rgba(255,170,0,.5); }
.item.banner.red { color: var(--red); text-shadow: 0 0 10px var(--red); }
.item.tool { color: var(--g-dim); font-size: 12px; }
.item.tool .t-head { color: var(--g); }
.item.ask { color: var(--cyan); }
.diff { margin: 4px 0 4px 16px; font-size: 12px; }
.diff .add { color: #4afa7b; } .diff .del { color: #ff5566; } .diff .hunk { color: var(--cyan); }
.stream { color: #ccffdd; opacity: .9; }
.reason { color: var(--g-dim); font-style: italic; font-size: 12px; }
.reason::before { content: "∴ "; }
.working { color: var(--magenta, #c8f); margin-top: 6px; }
.working .hint { color: var(--g-dim); }
.cursor::after { content: "▋"; animation: pulse 1s infinite; }

#attachments { flex: 0 0 auto; display: flex; flex-wrap: wrap; gap: 6px; padding: 0 8px; }
#attachments:empty { display: none; }
.attach { display: flex; align-items: center; gap: 6px; border: 1px solid var(--cyan); color: var(--cyan);
  padding: 2px 6px; font-size: 11px; }
.attach img { width: 28px; height: 28px; object-fit: cover; border: 1px solid var(--g-faint); }
.attach .x { cursor: pointer; color: var(--red); font-weight: 700; }
#inputBar.dragover { box-shadow: inset 0 0 0 2px var(--cyan); }
#inputBar { flex: 0 0 auto; border-top: 1px solid var(--g-faint); padding: 8px; display: flex; gap: 8px; align-items: center; }
#promptInput { flex: 1; background: rgba(0,0,0,.5); color: var(--g); border: 1px solid var(--g-dim);
  padding: 8px 10px; font-family: inherit; font-size: 13px; outline: none; }
#promptInput:focus { box-shadow: 0 0 10px rgba(0,255,102,.25); }
button.btn { background: none; border: 1px solid var(--g-dim); color: var(--g); padding: 7px 12px;
  font-family: inherit; cursor: pointer; font-size: 12px; }
button.btn:hover { background: rgba(0,255,102,.12); }
button.btn.danger { color: var(--red); border-color: var(--red); }
#statusBar { display: flex; gap: 14px; padding: 5px 10px; border-top: 1px solid var(--g-faint);
  font-size: 11px; color: var(--g-dim); align-items: center; }
#modeBtns { display: flex; gap: 4px; }
.modeBtn { font-size: 10px; padding: 2px 7px; border: 1px solid var(--g-faint); cursor: pointer; color: var(--g-dim); }
.modeBtn.active { color: var(--g); border-color: var(--g); text-shadow: 0 0 6px var(--g); }
.modeBtn.kami.active { color: var(--red); border-color: var(--red); text-shadow: 0 0 8px var(--red); }
#ctxBar { width: 110px; height: 8px; border: 1px solid var(--g-faint); position: relative; }
#ctxFill { height: 100%; background: var(--g-dim); width: 0%; transition: width .5s; }

#right { grid-row: 2; display: grid; grid-template-rows: 1fr 1fr 170px; gap: 8px; min-height: 0; }
#mesh { position: relative; }
#meshSvg { width: 100%; height: 100%; }
#memSvg { width: 100%; height: 100%; }
.mnode circle { fill: rgba(0,20,6,.85); stroke: var(--g-dim); cursor: pointer; transition: r .4s, stroke .4s; }
.mnode.s0 circle { stroke: #2a6; } .mnode.s1 circle { stroke: var(--cyan); } .mnode.s2 circle { stroke: var(--amber); }
.mnode.s3 circle { stroke: #c8f; } .mnode.s4 circle { stroke: var(--red); }
.mnode text { fill: var(--g-dim); font-size: 8px; text-anchor: middle; pointer-events: none; }
.mlink { stroke: var(--g-faint); }
.panel h2 .toggle { float: right; cursor: pointer; color: var(--g-dim); border: 1px solid var(--g-faint); padding: 0 6px; }
.panel h2 .toggle:hover { color: var(--g); }
#memLegend { position: absolute; bottom: 4px; left: 8px; font-size: 9px; color: var(--g-dim); pointer-events: none; }
#ops { overflow-y: auto; }
#opsBody { padding: 8px 10px; flex: 1; overflow-y: auto; font-size: 11px; }
.chainPipe { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; margin-bottom: 8px; }
.cstep { border: 1px solid var(--g-faint); padding: 2px 7px; color: var(--g-dim); font-size: 10px; }
.cstep.done { color: var(--g); border-color: var(--g-dim); opacity: .6; }
.cstep.active { color: var(--amber); border-color: var(--amber); text-shadow: 0 0 6px var(--amber); animation: pulse 1.2s infinite; }
.cstep.gate { border-style: dashed; }
.cstep.retry { color: var(--red); border-color: var(--red); }
.carrow { color: var(--g-faint); }
.todoRow { color: var(--g-dim); padding: 1px 0; }
.todoRow.done { opacity: .45; text-decoration: line-through; }
.todoRow.open { color: var(--g); }
#todoBar { height: 6px; border: 1px solid var(--g-faint); margin: 4px 0 6px; }
#todoFill { height: 100%; background: var(--g-dim); transition: width .4s; }
.node { cursor: pointer; }
.node circle { fill: rgba(0, 20, 6, .9); stroke: var(--g-dim); stroke-width: 1.5; transition: all .3s; }
.node.core circle { stroke: var(--g); filter: drop-shadow(0 0 6px var(--g)); }
.node.hot circle { stroke: var(--amber); filter: drop-shadow(0 0 10px var(--amber)); }
.node.dead circle { stroke: var(--g-faint); opacity: .5; }
.node text { fill: var(--g); font-size: 10px; text-anchor: middle; font-family: inherit; pointer-events: none; }
.node.dead text { fill: var(--g-dim); opacity: .6; }
.edge { stroke: var(--g-faint); stroke-width: 1; }
.edge.hot { stroke: var(--amber); stroke-dasharray: 4 4; animation: dash 1s linear infinite; }
@keyframes dash { to { stroke-dashoffset: -8; } }
#memPanel { overflow: hidden; }
#memBody { overflow-y: auto; padding: 8px 10px; font-size: 11px; flex: 1; }
#memBody .mem-h { color: var(--g); margin: 6px 0 2px; letter-spacing: 1px; }
#memBody .mem-b { color: var(--g-dim); margin-left: 8px; }

.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100;
  display: none; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
.modal-bg.open { display: flex; }
.modal { width: min(760px, 92vw); max-height: 84vh; border: 1px solid var(--g); background: #020c04;
  box-shadow: 0 0 40px rgba(0,255,102,.25); display: flex; flex-direction: column; }
body.kamikazeee .modal { border-color: var(--red); box-shadow: 0 0 40px rgba(255,34,68,.3); background: #0c0204; }
.modal h3 { padding: 8px 12px; border-bottom: 1px solid var(--g-faint); font-size: 13px; letter-spacing: 1px; }
.modal .body { padding: 12px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; font-size: 12px; flex: 1; }
.modal .actions { display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid var(--g-faint); }
.modal input { flex: 1; background: rgba(0,0,0,.5); color: var(--g); border: 1px solid var(--g-dim);
  padding: 6px 8px; font-family: inherit; outline: none; }
#toast { position: fixed; bottom: 16px; right: 16px; z-index: 200; color: var(--red); display: none;
  border: 1px solid var(--red); background: rgba(20,0,4,.9); padding: 8px 14px; }
::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: var(--g-faint); }

/* ── mobile: single panel + bottom tab bar ──────────────────── */
@media (max-width: 900px) {
  body { font-size: 14px; }
  /* tabs sit at the TOP — Safari's bottom address bar overlaps anything down there */
  #app { grid-template-columns: 1fr; grid-template-rows: 40px 42px 1fr; gap: 6px; padding: 6px; }
  header { grid-column: 1; padding: 0 8px; gap: 8px; overflow: hidden; }
  header .logo { font-size: 13px; letter-spacing: 2px; }
  #modelChip { display: none; }
  #right { display: contents; }                /* children become grid items */
  #sessions, #main, #mesh, #memPanel, #ops { grid-row: 3; grid-column: 1; display: none; min-height: 0; }
  body[data-tab="chat"] #main { display: flex; }
  body[data-tab="sess"] #sessions { display: flex; }
  body[data-tab="mesh"] #mesh { display: flex; }
  body[data-tab="brain"] #memPanel { display: flex; }
  body[data-tab="ops"] #ops { display: flex; }
  #tabs { display: flex; grid-row: 2; grid-column: 1; gap: 6px; }
  #tabs button { flex: 1; background: var(--panel); border: 1px solid var(--g-faint); color: var(--g-dim);
    font-family: inherit; font-size: 11px; letter-spacing: 1px; cursor: pointer; padding: 0; }
  #tabs button.active { color: var(--g); border-color: var(--g); text-shadow: 0 0 6px var(--g); }
  button.btn, .modeBtn { padding: 9px 12px; }  /* touch targets */
  .modeBtn { font-size: 9px; padding: 6px 6px; }
  #statusBar { flex-wrap: wrap; gap: 8px; }
  #promptInput { font-size: 16px; }            /* prevents iOS zoom-on-focus */
  .modal { width: 96vw; max-height: 90vh; }
  #rain { opacity: .3; }
}
</style>
</head>
<body>
<canvas id="rain"></canvas>
<div id="app">
  <header>
    <div class="logo">GRAYSKULL<span style="color:var(--g-dim)">//WEB</span></div>
    <div class="chip" id="modelChip">model: —</div>
    <div class="chip" id="mcpChip">mcp: —</div>
    <div class="chip" id="thinkChip" style="display:none">∴ thinking</div>
    <div class="chip" id="legendChip" style="display:none;color:var(--amber);border-color:var(--amber)">★ legendary</div>
    <div class="chip" id="kamiChip" style="display:none" >⚠ KAMIKAZEEE</div>
    <div style="flex:1"></div>
    <div class="chip" id="connChip">connecting…</div>
  </header>

  <div class="panel" id="sessions">
    <h2>SESSIONS</h2>
    <div id="sessionList"></div>
    <button id="newSess">+ NEW SESSION</button>
  </div>

  <div class="panel" id="main">
    <div id="transcript"></div>
    <div id="attachments"></div>
    <div id="inputBar">
      <input id="promptInput" placeholder="command the power of grayskull…  (paste or drop an image to attach)" autocomplete="off">
      <button class="btn" id="sendBtn">SEND</button>
      <button class="btn danger" id="stopBtn">ESC</button>
    </div>
    <div id="statusBar">
      <div id="modeBtns">
        <span class="modeBtn" data-mode="normal">NORMAL</span>
        <span class="modeBtn" data-mode="accept-edits">ACCEPT-EDITS</span>
        <span class="modeBtn" data-mode="plan">PLAN</span>
        <span class="modeBtn kami" data-mode="kamikazeee">KAMIKAZEEE</span>
      </div>
      <div style="flex:1"></div>
      <span id="busyTxt"></span>
      <div id="ctxBar" title="context fill"><div id="ctxFill"></div></div>
      <span id="ctxTxt">ctx 0%</span>
    </div>
  </div>

  <div id="right">
    <div class="panel" id="mesh">
      <h2>AGENT MESH</h2>
      <svg id="meshSvg"></svg>
    </div>
    <div class="panel" id="memPanel" style="position:relative">
      <h2>MEMORY ACTIVATION <span class="toggle" id="memToggle">TEXT</span></h2>
      <svg id="memSvg"></svg>
      <div id="memLegend"></div>
      <div id="memBody" style="display:none">(no session)</div>
    </div>
    <div class="panel" id="ops">
      <h2>CHAIN // TODO</h2>
      <div id="opsBody">(idle)</div>
    </div>
  </div>

  <nav id="tabs">
    <button data-tab="chat" class="active">CHAT</button>
    <button data-tab="sess">SESS</button>
    <button data-tab="mesh">MESH</button>
    <button data-tab="brain">BRAIN</button>
    <button data-tab="ops">OPS</button>
  </nav>
</div>

<div class="modal-bg" id="nodeModalBg"><div class="modal">
  <h3 id="nodeModalTitle">node</h3>
  <div class="body" id="nodeModalBody"></div>
  <div class="actions"><div style="flex:1"></div><button class="btn" onclick="closeModal('nodeModalBg')">CLOSE</button></div>
</div></div>

<div class="modal-bg" id="permModalBg"><div class="modal">
  <h3>⚠ PERMISSION REQUEST</h3>
  <div class="body" id="permBody"></div>
  <div class="actions">
    <button class="btn" id="permYes">[Y]ES</button>
    <button class="btn" id="permAlways">[A]LWAYS</button>
    <button class="btn danger" id="permNo">[N]O</button>
  </div>
</div></div>

<div class="modal-bg" id="askModalBg"><div class="modal">
  <h3>? GRAYSKULL ASKS</h3>
  <div class="body" id="askBody"></div>
  <div class="actions">
    <input id="askInput" placeholder="type an answer…">
    <button class="btn" id="askSend">ANSWER</button>
  </div>
</div></div>

<div id="toast"></div>

<script>
/* ── matrix rain ─────────────────────────────────────────────── */
const rain = document.getElementById("rain"), rctx = rain.getContext("2d");
const GLYPHS = "ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉ01GRAYSKULL";
let cols = [], fs = 14;
function sizeRain() {
  rain.width = innerWidth; rain.height = innerHeight;
  cols = Array(Math.ceil(innerWidth / fs)).fill(0).map(() => Math.random() * -50);
}
sizeRain(); addEventListener("resize", sizeRain);
setInterval(() => {
  rctx.fillStyle = "rgba(1,7,1,.12)"; rctx.fillRect(0, 0, rain.width, rain.height);
  rctx.font = fs + "px monospace";
  const color = document.body.classList.contains("kamikazeee") ? "#5a0a14" : "#0a3d1a";
  for (let i = 0; i < cols.length; i++) {
    rctx.fillStyle = Math.random() > .97 ? (document.body.classList.contains("kamikazeee") ? "#ff2244" : "#00ff66") : color;
    rctx.fillText(GLYPHS[Math.random() * GLYPHS.length | 0], i * fs, cols[i] * fs);
    cols[i] = cols[i] * fs > rain.height && Math.random() > .98 ? 0 : cols[i] + 1;
  }
}, 60);

/* ── state ───────────────────────────────────────────────────── */
const S = {
  ws: null, sessions: [], current: null, defaultCwd: "",
  transcripts: {},   // sid -> array of rendered item HTML
  streams: {},       // sid -> {text, reason}
  status: {},        // sid -> status msg
  nodes: {},         // sid -> Map(nodeId -> {label, kind, state, log:[]})
  memory: {},        // sid -> {global, local}
  pendingPerm: null, pendingAsk: null,
};
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));

/* ── websocket ───────────────────────────────────────────────── */
function connect() {
  const ws = new WebSocket((location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws");
  S.ws = ws;
  ws.onopen = () => { $("connChip").textContent = "● online"; $("connChip").style.color = "var(--g)"; };
  ws.onclose = () => { $("connChip").textContent = "○ reconnecting…"; setTimeout(connect, 1500); };
  ws.onmessage = (e) => handle(JSON.parse(e.data));
}
const send = (o) => S.ws?.readyState === 1 && S.ws.send(JSON.stringify(o));

function handle(m) {
  switch (m.t) {
    case "hello": S.defaultCwd = m.defaultCwd; break;
    case "sessions":
      S.sessions = m.list;
      if (!S.current && m.list.length) S.current = m.list[m.list.length - 1].sid;
      renderSessions(); renderAll(); break;
    case "replay":
      S.transcripts[m.sid] = [];
      for (const it of m.items) pushTranscript(m.sid, it, false);
      renderTranscript(); break;
    case "item": pushTranscript(m.sid, m.item, true); break;
    case "delta": stream(m.sid).text += m.text; renderStreamMaybe(m.sid); break;
    case "reasoning": stream(m.sid).reason = (stream(m.sid).reason + m.text).slice(-400); renderStreamMaybe(m.sid); break;
    case "stream_end": S.streams[m.sid] = { text: "", reason: "" }; renderStreamMaybe(m.sid); break;
    case "busy": (S.status[m.sid] ??= {}).busy = m.busy; (S.status[m.sid]).what = m.what; renderSessions(); renderStatus(); if (m.sid === S.current) renderTranscript(); break;
    case "status": S.status[m.sid] = Object.assign(S.status[m.sid] ?? {}, m); renderSessions(); renderStatus(); renderOps(); if (m.sid === S.current) renderTranscript(); break;
    case "memory": S.memory[m.sid] = m; renderMemory(); break;
    case "agent": agentEvent(m.sid, m.ev); break;
    case "perm_req": S.pendingPerm = m; showPerm(); break;
    case "ask_req": S.pendingAsk = m; showAsk(); break;
    case "perm_done": if (S.pendingPerm?.reqId === m.reqId) { S.pendingPerm = null; closeModal("permModalBg"); } break;
    case "ask_done": if (S.pendingAsk?.reqId === m.reqId) { S.pendingAsk = null; closeModal("askModalBg"); } break;
    case "error": toast(m.text); break;
  }
}
const stream = (sid) => (S.streams[sid] ??= { text: "", reason: "" });

/* ── sessions ────────────────────────────────────────────────── */
function renderSessions() {
  $("sessionList").innerHTML = S.sessions.map((s) => {
    const st = S.status[s.sid] ?? {};
    return `<div class="sess ${s.sid === S.current ? "active" : ""}" onclick="selectSession('${s.sid}')">
      <div class="sid">${s.origin === "cli" ? "⌨ " : ""}${s.sid} ${st.busy ? '<span class="busy">⣾ ' + esc(st.what || "working") + "</span>" : ""}</div>
      <div class="cwd">${esc(s.cwd)}</div></div>`;
  }).join("");
}
function selectSession(sid) { S.current = sid; renderSessions(); renderAll(); }
$("newSess").onclick = () => {
  const cwd = prompt("project directory:", S.defaultCwd);
  if (cwd) send({ t: "new_session", cwd });
};

/* ── transcript ──────────────────────────────────────────────── */
function itemHtml(it) {
  if (it.type === "user") return `<div class="item user">${esc(it.text)}${(it.images||[]).map((u) => `<br><img class="msg-img" src="${u}">`).join("")}</div>`;
  if (it.type === "assistant") return `<div class="item assistant">${esc(it.text)}</div>`;
  if (it.type === "note") return `<div class="item note">${esc(it.text)}</div>`;
  if (it.type === "banner") return `<div class="item banner ${it.color === "red" ? "red" : ""}">${esc(it.text)}</div>`;
  if (it.type === "ask") return `<div class="item ask">? ${esc(it.question)}${it.answer ? "<br>→ " + esc(it.answer) : ""}</div>`;
  if (it.type === "tool") {
    const icon = it.state === "running" ? "◐" : it.state === "done" ? "●" : it.state === "denied" ? "⊘" : "✗";
    let html = `<div class="item tool"><span class="t-head">${icon} ${esc(it.detail)}</span>`;
    if (it.state === "done" && it.preview) {
      const lines = it.preview.split("\n").filter((l) => !/^(Index:|={3,}|---|\+\+\+)/.test(l)).slice(0, 30);
      html += `<div class="diff">` + lines.map((l) =>
        `<div class="${l[0] === "+" ? "add" : l[0] === "-" ? "del" : l.startsWith("@@") ? "hunk" : ""}">${esc(l) || "&nbsp;"}</div>`).join("") + `</div>`;
    } else if (it.result && it.state !== "running") {
      html += `<br><span style="opacity:.7">${esc(it.result.split("\n").slice(0, 3).join("\n").slice(0, 280))}</span>`;
    }
    return html + "</div>";
  }
  return "";
}
function pushTranscript(sid, it, live) {
  const arr = (S.transcripts[sid] ??= []);
  // replace running tool card when it completes
  if (it.type === "tool" && it.state !== "running") {
    const probe = `data-tool="${esc(it.detail)}"`;
    const idx = arr.findLastIndex((h) => h.includes(probe) && h.includes("◐"));
    if (idx >= 0) { arr[idx] = `<span data-tool="${esc(it.detail)}"></span>` + itemHtml(it); if (live && sid === S.current) renderTranscript(); return; }
  }
  const wrapped = it.type === "tool" ? `<span data-tool="${esc(it.detail)}"></span>` + itemHtml(it) : itemHtml(it);
  arr.push(wrapped);
  if (arr.length > 600) arr.shift();
  if (live && sid === S.current) renderTranscript();
  if (it.type === "tool") nodePulse(sid, "core", it.detail + " [" + it.state + "]");
}
const SPIN = ["⠋","⠙","⠹","⠸","⠼","⠴","⠦","⠧","⠇","⠏"];
let spinFrame = 0;
function renderTranscript() {
  const el = $("transcript");
  const sid = S.current;
  const st = stream(sid ?? "");
  const stat = S.status[sid] ?? {};
  el.innerHTML = (S.transcripts[sid] ?? []).join("") +
    (st.reason && !st.text ? `<div class="reason">${esc(st.reason.split("\n").slice(-3).join("\n"))}</div>` : "") +
    (st.text ? `<div class="stream cursor">${esc(st.text)}</div>` : "") +
    // always show activity while the session is busy — even before any reasoning
    // or token has streamed, so "thinking" never looks like a frozen screen
    (stat.busy ? `<div class="working">${SPIN[spinFrame]} ${esc(stat.what || "working")}… <span class="hint">(Esc to interrupt)</span></div>` : "");
  el.scrollTop = el.scrollHeight;
}
// setInterval (unlike rAF) keeps ticking in a backgrounded tab, so the spinner
// and any buffered stream keep updating while you're in another window
setInterval(() => {
  const stat = S.status[S.current] ?? {};
  if (stat.busy) { spinFrame = (spinFrame + 1) % SPIN.length; renderTranscript(); }
}, 110);
let streamRaf = null;
function renderStreamMaybe(sid) {
  if (sid !== S.current || streamRaf) return;
  streamRaf = requestAnimationFrame(() => { streamRaf = null; renderTranscript(); });
}

/* ── input / modes ───────────────────────────────────────────── */
function sendPrompt() {
  const text = $("promptInput").value.trim();
  const images = S.attachments.slice();
  if ((!text && !images.length) || !S.current) return;
  send({ t: "prompt", sid: S.current, text, images });
  $("promptInput").value = "";
  S.attachments = [];
  renderAttachments();
}
$("sendBtn").onclick = sendPrompt;
$("promptInput").addEventListener("keydown", (e) => { if (e.key === "Enter") sendPrompt(); });

/* ── image paste / drag-drop attachments ─────────────────────── */
S.attachments = S.attachments || [];
function renderAttachments() {
  $("attachments").innerHTML = (S.attachments || []).map((url, i) =>
    `<span class="attach"><img src="${url}"><span>img ${i + 1}</span><span class="x" onclick="removeAttachment(${i})">✕</span></span>`).join("");
}
function removeAttachment(i) { S.attachments.splice(i, 1); renderAttachments(); }
function addImageBlob(blob) {
  if (!blob || !blob.type.startsWith("image/")) return;
  const r = new FileReader();
  r.onload = () => { S.attachments.push(r.result); renderAttachments(); };
  r.readAsDataURL(blob);
}
// paste anywhere (Firefox/Chromium give the image via clipboardData.items)
addEventListener("paste", (e) => {
  const items = (e.clipboardData || {}).items || [];
  let got = false;
  for (const it of items) {
    if (it.kind === "file" && it.type.startsWith("image/")) { addImageBlob(it.getAsFile()); got = true; }
  }
  if (got) { e.preventDefault(); $("promptInput").focus(); }
});
// drag & drop onto the input bar
const bar = $("inputBar");
["dragenter", "dragover"].forEach((ev) => bar.addEventListener(ev, (e) => { e.preventDefault(); bar.classList.add("dragover"); }));
["dragleave", "drop"].forEach((ev) => bar.addEventListener(ev, (e) => { e.preventDefault(); bar.classList.remove("dragover"); }));
bar.addEventListener("drop", (e) => { for (const f of (e.dataTransfer || {}).files || []) addImageBlob(f); });
$("stopBtn").onclick = () => S.current && send({ t: "interrupt", sid: S.current });
document.querySelectorAll(".modeBtn").forEach((b) => {
  b.onclick = () => S.current && send({ t: "mode", sid: S.current, mode: b.dataset.mode });
});
addEventListener("keydown", (e) => { if (e.key === "Escape" && !S.pendingPerm && !S.pendingAsk) S.current && send({ t: "interrupt", sid: S.current }); });

function renderStatus() {
  const st = S.status[S.current] ?? {};
  $("modelChip").textContent = "model: " + (st.model ? st.model.split("/").pop() : "—");
  $("mcpChip").textContent = "mcp: " + (st.mcp ? st.mcp.filter((m) => m.state === "connected").length + "/" + st.mcp.length : "—");
  $("thinkChip").style.display = st.thinking ? "" : "none";
  $("legendChip").style.display = st.legendary ? "" : "none";
  $("ctxFill").style.width = (st.ctxPct ?? 0) + "%";
  $("ctxFill").style.background = (st.ctxPct ?? 0) > 70 ? "var(--amber)" : "var(--g-dim)";
  $("ctxTxt").textContent = "ctx " + (st.ctxPct ?? 0) + "%";
  $("busyTxt").textContent = st.busy ? "⣾ " + (st.what || "working") + " " : "";
  document.querySelectorAll(".modeBtn").forEach((b) => b.classList.toggle("active", b.dataset.mode === st.mode));
  const kami = st.mode === "kamikazeee";
  document.body.classList.toggle("kamikazeee", kami);
  $("kamiChip").style.display = kami ? "" : "none";
  $("kamiChip").className = "chip alert";
  // mcp nodes
  if (st.mcp) for (const m of st.mcp) ensureNode(S.current, "mcp:" + m.name, m.name, "mcp", m.state === "connected" ? "idle" : "dead");
  renderMesh();
}

/* ── agent mesh ──────────────────────────────────────────────── */
function nodes(sid) { return (S.nodes[sid] ??= new Map()); }
function ensureNode(sid, id, label, kind, state) {
  const map = nodes(sid);
  if (!map.has(id)) map.set(id, { id, label, kind, state: state ?? "idle", log: [] });
  else if (state) map.get(id).state = state;
  return map.get(id);
}
function nodeLog(sid, id, line) {
  const n = nodes(sid).get(id);
  if (!n) return;
  n.log.push(`[${new Date().toTimeString().slice(0, 8)}] ${line}`);
  if (n.log.length > 400) n.log.shift();
  if ($("nodeModalBg").classList.contains("open") && S.modalNode === id && sid === S.current) {
    $("nodeModalBody").textContent = n.log.join("\n");
    $("nodeModalBody").scrollTop = $("nodeModalBody").scrollHeight;
  }
}
function nodePulse(sid, id, line) {
  const n = ensureNode(sid, id, id === "core" ? "GRAYSKULL" : id, id === "core" ? "core" : "agent");
  if (n.state !== "dead") { n.state = "hot"; n.cool = Date.now() + 2500; }
  if (line) nodeLog(sid, id, line);
  renderMesh();
}
function agentEvent(sid, ev) {
  if (ev.kind === "spawn") { ensureNode(sid, ev.id, ev.agent, "agent", "hot").cool = Date.now() + 2500; nodeLog(sid, ev.id, "SPAWN: " + ev.task); }
  if (ev.kind === "tool") nodePulse(sid, ev.id, ev.detail + " [" + ev.state + "]");
  if (ev.kind === "delta") nodeLog(sid, ev.id, ev.text.trim());
  if (ev.kind === "done") { ensureNode(sid, ev.id, ev.agent, "agent", "dead"); nodeLog(sid, ev.id, "DONE:\n" + ev.report); }
  renderMesh();
}
setInterval(() => { // cool down hot nodes
  let dirty = false;
  for (const map of Object.values(S.nodes)) for (const n of map.values()) {
    if (n.state === "hot" && n.cool && Date.now() > n.cool) { n.state = "idle"; dirty = true; }
  }
  if (dirty) renderMesh();
}, 800);

function renderMesh() {
  const svg = $("meshSvg");
  const W = svg.clientWidth || 400, H = svg.clientHeight || 400;
  const map = nodes(S.current ?? "");
  ensureNode(S.current ?? "", "core", "GRAYSKULL", "core");
  const core = map.get("core");
  const agents = [...map.values()].filter((n) => n.kind === "agent");
  const mcps = [...map.values()].filter((n) => n.kind === "mcp");
  const cx = W / 2, cy = H / 2 - 20;
  let html = "";
  const place = (list, r, a0) => list.map((n, i) => {
    const a = a0 + (i / Math.max(list.length, 1)) * Math.PI * 1.6;
    return { n, x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
  });
  const placed = [...place(agents, Math.min(W, H) / 2 - 56, -Math.PI / 2), ...place(mcps, Math.min(W, H) / 2 - 30, Math.PI / 3)];
  for (const p of placed) html += `<line class="edge ${p.n.state === "hot" ? "hot" : ""}" x1="${cx}" y1="${cy}" x2="${p.x}" y2="${p.y}"/>`;
  const drawNode = (n, x, y, r) => `<g class="node ${n.kind} ${n.state}" onclick="openNode('${n.id}')">
    <circle cx="${x}" cy="${y}" r="${r}"/>
    <text x="${x}" y="${y + r + 12}">${esc(n.label.slice(0, 16))}</text>
    <text x="${x}" y="${y + 4}" style="font-size:${r > 20 ? 14 : 11}px">${n.kind === "core" ? "⚡" : n.kind === "mcp" ? "⇄" : "⚔"}</text></g>`;
  html += drawNode(core, cx, cy, 26);
  for (const p of placed) html += drawNode(p.n, p.x, p.y, 16);
  svg.innerHTML = html;
}
function openNode(id) {
  const n = nodes(S.current ?? "").get(id);
  if (!n) return;
  S.modalNode = id;
  $("nodeModalTitle").textContent = (n.kind === "core" ? "⚡ " : n.kind === "mcp" ? "⇄ " : "⚔ ") + n.label + " — " + n.state;
  $("nodeModalBody").textContent = n.log.join("\n") || "(no activity yet)";
  $("nodeModalBg").classList.add("open");
  $("nodeModalBody").scrollTop = $("nodeModalBody").scrollHeight;
}
function closeModal(id) { $(id).classList.remove("open"); }
addEventListener("resize", renderMesh);

/* ── memory panel: activation graph + text view ──────────────── */
let memView = "graph";
$("memToggle").onclick = () => {
  memView = memView === "graph" ? "text" : "graph";
  $("memToggle").textContent = memView === "graph" ? "TEXT" : "GRAPH";
  $("memSvg").style.display = memView === "graph" ? "" : "none";
  $("memLegend").style.display = memView === "graph" ? "" : "none";
  $("memBody").style.display = memView === "graph" ? "none" : "";
  renderMemory();
};

function renderMemory() {
  const m = S.memory[S.current] ?? {};
  // text view
  let html = "";
  if (m.global) html += `<div class="mem-h">⚡ GLOBAL VAULT</div>` + m.global.split("\n").map((l) => `<div class="mem-b">${esc(l)}</div>`).join("");
  if (m.local) html += m.local.split("\n").map((l) =>
    l.startsWith("##") ? `<div class="mem-h">${esc(l.replace(/^#+\s*/, "").toUpperCase())}</div>`
    : l.trim() ? `<div class="mem-b">${esc(l)}</div>` : "").join("");
  $("memBody").innerHTML = html || "(memory empty)";
  renderMemoryGraph(m.graph);
}

function renderMemoryGraph(graph) {
  const svg = $("memSvg");
  if (!graph || !graph.nodes?.length) {
    svg.innerHTML = `<text x="50%" y="50%" fill="#0a5" font-size="11" text-anchor="middle">no project memory yet — every turn grows the brain</text>`;
    $("memLegend").textContent = "";
    return;
  }
  const W = svg.clientWidth || 400, H = svg.clientHeight || 260;
  const sections = [...new Set(graph.nodes.map((n) => n.section))];
  // section cluster anchors arranged in a ring
  const anchors = {};
  sections.forEach((s, i) => {
    const a = (i / sections.length) * Math.PI * 2 - Math.PI / 2;
    anchors[s] = { x: W / 2 + (W / 3.1) * Math.cos(a), y: H / 2 + (H / 3.2) * Math.sin(a) };
  });
  // nodes orbit their section anchor, sorted so strong memories sit closest
  const pos = {};
  for (const s of sections) {
    const members = graph.nodes.filter((n) => n.section === s).sort((a, b) => b.score - a.score);
    members.forEach((n, i) => {
      const a = (i / Math.max(members.length, 1)) * Math.PI * 2;
      const r = 12 + i * 7;
      pos[n.id] = { x: anchors[s].x + r * Math.cos(a), y: anchors[s].y + r * Math.sin(a) };
    });
  }
  let html = "";
  for (const l of graph.links) {
    const a = pos[l.a], b = pos[l.b];
    if (!a || !b) continue;
    html += `<line class="mlink" x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke-opacity="${Math.min(l.sim, .8)}" stroke-width="${l.sim > .6 ? 1.5 : 1}"/>`;
  }
  for (const n of graph.nodes) {
    const p = pos[n.id];
    const r = 3 + Math.min(n.score, 3) * 3.5;          // activation = size
    const glow = n.score > 1.5 ? `filter="drop-shadow(0 0 ${n.score * 2}px var(--g))"` : "";
    const si = sections.indexOf(n.section) % 5;
    html += `<g class="mnode s${si}" onclick='openMemNode("${n.id}")'>
      <circle cx="${p.x}" cy="${p.y}" r="${r}" ${glow} fill-opacity="${0.4 + Math.min(n.score, 3) / 5}"/>
    </g>`;
  }
  svg.innerHTML = html;
  $("memLegend").textContent = sections.map((s, i) => `●${i}=${s}`).join("  ") + "  · size = activation";
}
function openMemNode(id) {
  const m = S.memory[S.current];
  const n = m?.graph?.nodes.find((x) => x.id === id);
  if (!n) return;
  const neighbors = (m.graph.links || [])
    .filter((l) => l.a === id || l.b === id)
    .map((l) => {
      const other = m.graph.nodes.find((x) => x.id === (l.a === id ? l.b : l.a));
      return other ? `  ${(l.sim * 100) | 0}% ↔ ${other.text}` : "";
    })
    .filter(Boolean);
  S.modalNode = null;
  $("nodeModalTitle").textContent = "🧠 " + n.section;
  $("nodeModalBody").textContent =
    n.text +
    `\n\nactivation: ${n.score}   uses: ${n.uses}` +
    (neighbors.length ? "\n\nlinked memories (spreading activation):\n" + neighbors.join("\n") : "");
  $("nodeModalBg").classList.add("open");
}

/* ── permission / ask modals ─────────────────────────────────── */
function showPerm() {
  const p = S.pendingPerm;
  if (!p) return closeModal("permModalBg");
  let body = p.detail;
  if (p.preview) body += "\n\n" + p.preview.split("\n").filter((l) => !/^(Index:|={3,}|---|\+\+\+)/.test(l)).slice(0, 40).join("\n");
  $("permBody").textContent = body;
  $("permModalBg").classList.add("open");
}
const answerPerm = (v) => { const p = S.pendingPerm; if (!p) return; send({ t: "answer", sid: p.sid, reqId: p.reqId, value: v }); S.pendingPerm = null; closeModal("permModalBg"); };
$("permYes").onclick = () => answerPerm("yes");
$("permAlways").onclick = () => answerPerm("always");
$("permNo").onclick = () => answerPerm("no");
addEventListener("keydown", (e) => {
  if (S.pendingPerm) { if (e.key === "y") answerPerm("yes"); if (e.key === "a") answerPerm("always"); if (e.key === "n") answerPerm("no"); }
});

function showAsk() {
  const a = S.pendingAsk;
  if (!a) return closeModal("askModalBg");
  $("askBody").innerHTML = esc(a.question) + (a.options ? "<br><br>" + a.options.map((o, i) =>
    `<button class="btn" style="margin:3px" onclick="answerAsk(${JSON.stringify(o).replace(/"/g, "&quot;")})">${i + 1}. ${esc(o)}</button>`).join("") : "");
  $("askModalBg").classList.add("open");
  $("askInput").focus();
}
function answerAsk(v) { const a = S.pendingAsk; if (!a) return; send({ t: "answer", sid: a.sid, reqId: a.reqId, value: v }); S.pendingAsk = null; closeModal("askModalBg"); $("askInput").value = ""; }
$("askSend").onclick = () => $("askInput").value.trim() && answerAsk($("askInput").value.trim());
$("askInput").addEventListener("keydown", (e) => { if (e.key === "Enter" && $("askInput").value.trim()) answerAsk($("askInput").value.trim()); });

/* ── chain pipeline + todo panel ─────────────────────────────── */
function renderOps() {
  const st = S.status[S.current] ?? {};
  let html = "";
  const chain = st.chain;
  if (chain) {
    html += `<div style="color:var(--g);margin-bottom:4px">⛓ ${esc(chain.name)} <span style="color:var(--g-dim)">[${chain.mode}] step ${chain.step}/${chain.total}</span></div><div class="chainPipe">`;
    chain.steps.forEach((s, i) => {
      const cls = ["cstep"];
      if (chain.gates[i]) cls.push("gate");
      if (i + 1 < chain.step) cls.push("done");
      if (i + 1 === chain.step) cls.push("active", chain.retrying ? "retry" : "");
      html += `<span class="${cls.join(" ")}" title="${chain.gates[i] ? "review gate" : ""}">${chain.gates[i] ? "⛩ " : ""}${esc(s)}</span>`;
      if (i < chain.steps.length - 1) html += `<span class="carrow">→</span>`;
    });
    html += `</div>`;
  } else if (st.sticky) {
    html += `<div style="color:var(--g-dim);margin-bottom:6px">⛓ ${esc(st.sticky.name)} [${st.sticky.mode}] armed — next prompt runs the chain</div>`;
  }
  const todo = st.todo ?? [];
  if (todo.length) {
    const done = todo.filter((i) => i.done).length;
    html += `<div style="color:var(--g)">TODO ${done}/${todo.length}</div><div id="todoBar"><div id="todoFill" style="width:${(done / todo.length) * 100}%"></div></div>`;
    html += todo.map((i) => `<div class="todoRow ${i.done ? "done" : "open"}">${i.done ? "✓" : "▢"} ${esc(i.text)}</div>`).join("");
  }
  $("opsBody").innerHTML = html || "(idle — chains and todos appear here live)";
}

/* ── mobile tabs ─────────────────────────────────────────────── */
document.body.dataset.tab = "chat";
document.querySelectorAll("#tabs button").forEach((b) => {
  b.onclick = () => {
    document.body.dataset.tab = b.dataset.tab;
    document.querySelectorAll("#tabs button").forEach((x) => x.classList.toggle("active", x === b));
    // svg panels measure 0x0 while hidden — re-render once visible
    requestAnimationFrame(() => { renderMesh(); renderMemory(); renderOps(); renderTranscript(); });
  };
});
// jump back to chat when a session is picked on mobile
const _select = selectSession;
selectSession = (sid) => { _select(sid); if (innerWidth <= 900) document.querySelector('#tabs button[data-tab="chat"]')?.click(); };

function toast(text) { const t = $("toast"); t.textContent = "✗ " + text; t.style.display = "block"; setTimeout(() => t.style.display = "none", 5000); }
function renderAll() { renderTranscript(); renderStatus(); renderMemory(); renderMesh(); renderOps(); }
connect();
</script>
